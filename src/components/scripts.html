<script>
    // Wait for DOM to be fully loaded before executing any script
    document.addEventListener('DOMContentLoaded', function() {
        // Debugging
        console.log('DOM Content Loaded. Initializing theme system...');

        // Get DOM elements
        const htmlElement = document.documentElement;
        const moonIcon = document.getElementById('moon-icon');
        const sunIcon = document.getElementById('sun-icon');
        const mobileMoonIcon = document.getElementById('mobile-moon-icon');
        const mobileSunIcon = document.getElementById('mobile-sun-icon');
        
        // Theme toggle buttons
        const themeToggle = document.getElementById('theme-toggle');
        const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
        
        // Check for dark mode preference
        const currentTheme = localStorage.getItem('color-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // Function to update the UI based on the current theme
        function updateThemeUI(isDark) {
            // Update HTML class
            if (isDark) {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }
            
            // Update desktop toggle icons
            if (moonIcon && sunIcon) {
                moonIcon.classList.toggle('hidden', isDark);
                sunIcon.classList.toggle('hidden', !isDark);
            }
            
            // Update mobile toggle icons
            if (mobileMoonIcon && mobileSunIcon) {
                mobileMoonIcon.classList.toggle('hidden', isDark);
                mobileSunIcon.classList.toggle('hidden', !isDark);
            }
        }
        
        // Set initial theme
        if (currentTheme === 'dark' || (!currentTheme && prefersDark)) {
            updateThemeUI(true);
        } else {
            updateThemeUI(false);
        }
        
        // Theme toggle function
        function toggleTheme() {
            const isDark = htmlElement.classList.contains('dark');
            
            // Toggle theme
            updateThemeUI(!isDark);
            
            // Save preference
            localStorage.setItem('color-theme', !isDark ? 'dark' : 'light');
        }
        
        // Add event listeners
        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }
        
        if (mobileThemeToggle) {
            mobileThemeToggle.addEventListener('click', toggleTheme);
        }

        // Mobile menu toggle
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // Testimonial Slideshow
        const slider = document.getElementById('testimonial-slider');
        const dots = document.querySelectorAll('#testimonial-dots button');
        const prevButton = document.getElementById('prev-testimonial');
        const nextButton = document.getElementById('next-testimonial');
        
        if (slider && dots.length && prevButton && nextButton) {
            let currentSlide = 0;
            const slideCount = document.querySelectorAll('.testimonial-slide').length;
            
            // Initialize slider
            updateSliderPosition();
            
            // Navigation with dots
            dots.forEach(dot => {
                dot.addEventListener('click', function() {
                    currentSlide = parseInt(this.getAttribute('data-index') || '0');
                    updateSliderPosition();
                    updateDots();
                });
            });
            
            // Previous button
            prevButton.addEventListener('click', function() {
                currentSlide = (currentSlide - 1 + slideCount) % slideCount;
                updateSliderPosition();
                updateDots();
            });
            
            // Next button
            nextButton.addEventListener('click', function() {
                currentSlide = (currentSlide + 1) % slideCount;
                updateSliderPosition();
                updateDots();
            });
            
            // Auto-advance slides every 5 seconds
            setInterval(function() {
                currentSlide = (currentSlide + 1) % slideCount;
                updateSliderPosition();
                updateDots();
            }, 5000);
            
            // Helper functions
            function updateSliderPosition() {
                slider.style.transform = `translateX(-${currentSlide * 100}%)`;
            }
            
            function updateDots() {
                dots.forEach((dot, index) => {
                    if (index === currentSlide) {
                        dot.classList.remove('bg-gray-300', 'dark:bg-gray-600');
                        dot.classList.add('bg-[#1d4ed8]', 'dark:bg-blue-400');
                    } else {
                        dot.classList.remove('bg-[#1d4ed8]', 'dark:bg-blue-400');
                        dot.classList.add('bg-gray-300', 'dark:bg-gray-600');
                    }
                });
            }
        }

        // Projects Slideshow
        const projectsSlider = document.getElementById('projects-slider');
        if (projectsSlider) {
            const slides = document.querySelectorAll('.project-slide');
            const totalSlides = slides.length;
            const prevBtn = document.getElementById('prev-project');
            const nextBtn = document.getElementById('next-project');
            const projectDots = document.querySelectorAll('#project-dots button');
            
            let currentSlide = 0;
            let slideWidth = slides[0]?.offsetWidth || 0;
            let autoPlayTimer;
            
            // Reset slide width on window resize
            window.addEventListener('resize', function() {
                slideWidth = slides[0]?.offsetWidth || 0;
                goToSlide(currentSlide);
            });
            
            // Initialize the slider
            function initSlider() {
                // Set initial position
                goToSlide(0);
                
                // Start auto-play
                startAutoPlay();
                
                // Add event listeners for controls
                if (prevBtn) prevBtn.addEventListener('click', prevSlide);
                if (nextBtn) nextBtn.addEventListener('click', nextSlide);
                
                // Add event listeners for dots
                projectDots.forEach((dot, index) => {
                    dot.addEventListener('click', () => {
                        goToSlide(index);
                    });
                });
                
                // Pause auto-play on hover
                projectsSlider.addEventListener('mouseenter', stopAutoPlay);
                projectsSlider.addEventListener('mouseleave', startAutoPlay);
            }
            
            function goToSlide(index) {
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;
                
                currentSlide = index;
                projectsSlider.style.transform = `translateX(-${currentSlide * 100}%)`;
                
                // Update dots
                updateProjectDots();
            }
            
            function prevSlide() {
                goToSlide(currentSlide - 1);
            }
            
            function nextSlide() {
                goToSlide(currentSlide + 1);
            }
            
            function updateProjectDots() {
                projectDots.forEach((dot, index) => {
                    if (index === currentSlide) {
                        dot.classList.remove('opacity-50');
                        dot.classList.add('opacity-100');
                    } else {
                        dot.classList.remove('opacity-100');
                        dot.classList.add('opacity-50');
                    }
                });
            }
            
            function startAutoPlay() {
                stopAutoPlay(); // Clear any existing timer
                autoPlayTimer = setInterval(nextSlide, 5000);
            }
            
            function stopAutoPlay() {
                clearInterval(autoPlayTimer);
            }
            
            // Initialize the slider
            if (totalSlides > 0) {
                initSlider();
            }
        }

        // Back to top button
        const backToTopButton = document.getElementById('back-to-top');
        if (backToTopButton) {
            backToTopButton.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // Show/hide back to top button based on scroll position
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    backToTopButton.classList.add('opacity-100');
                    backToTopButton.classList.remove('opacity-0');
                } else {
                    backToTopButton.classList.add('opacity-0');
                    backToTopButton.classList.remove('opacity-100');
                }
            });
        }
    });
</script>
